<!DOCTYPE html>
<html>
<head>
  <title>GitHub Release Dashboard</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }
    .box {
      padding: 12px;
      border: 1px solid #ddd;
      margin-bottom: 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<h2>Release Dashboard</h2>

<div id="content">Loading...</div>

<script>
const owner = "contentWizardWL";
const repo = "autoupdate";

async function load() {
  const res = await fetch(
    `https://api.github.com/repos/${owner}/${repo}/releases`
  );
  const data = await res.json();

  const latest = data[0];

  let html = `
    <div class="box">
      <b>Latest version:</b> ${latest.tag_name}<br>
      <b>Name:</b> ${latest.name}<br>
    </div>
  `;

  latest.assets.forEach(a => {
    html += `
      <div class="box">
        <b>${a.name}</b><br>
        Downloads: ${a.download_count}<br>
        <a href="${a.browser_download_url}" target="_blank">Download</a>
      </div>
    `;
  });

  document.getElementById("content").innerHTML = html;
}

load();
</script>

</body>
</html>
